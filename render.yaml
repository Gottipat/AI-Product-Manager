services:
  - type: web
    name: meeting-ai-backend
    env: docker
    dockerfilePath: docker/ai-backend.Dockerfile
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meeting-ai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true

  - type: web
    name: meeting-ai-web
    env: docker
    dockerfilePath: docker/web.Dockerfile
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://meeting-ai-backend.onrender.com/api/v1"
      - key: PORT
        value: 3001

  - type: worker
    name: meeting-ai-bot-runner
    env: docker
    dockerfilePath: docker/bot-runner.Dockerfile
    plan: standard
    envVars:
      - key: AI_BACKEND_URL
        value: "https://meeting-ai-backend.onrender.com"
      - key: HEADLESS
        value: "true"
      - key: MEET_LINK
        sync: false # Set manually in Render dashboard if needed for ad-hoc runs
      - key: GOOGLE_EMAIL
        sync: false
      - key: GOOGLE_PASSWORD
        sync: false
      - key: BOT_DISPLAY_NAME
        value: "Meeting AI Bot"

databases:
  - name: meeting-ai-db
    plan: starter
