services:
  - type: web
    name: meeting-ai-backend
    env: docker
    dockerfilePath: docker/ai-backend.Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meeting-ai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true

databases:
  - name: meeting-ai-db
    plan: free
