<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Meeting AI — Transcript Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <img src="../../icons/icon-48.png" alt="Meeting AI" class="header-icon">
        <div>
          <h1 class="header-title">Meeting AI</h1>
          <p class="header-subtitle">Transcript Capture</p>
        </div>
      </div>
      <button id="settingsToggle" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
    </header>

    <!-- Connection Status -->
    <div id="connectionBar" class="connection-bar disconnected">
      <span class="status-dot"></span>
      <span id="connectionText">Checking backend...</span>
    </div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- No Meet Page State -->
      <div id="noMeetState" class="state-panel" style="display: none;">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5">
            <path
              d="M15 10l4.553-2.276A1 1 0 0 1 21 8.618v6.764a1 1 0 0 1-1.447.894L15 14M5 18h8a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2z" />
          </svg>
          <p>Open a Google Meet session to start capturing transcripts</p>
        </div>
      </div>

      <!-- Ready State -->
      <div id="readyState" class="state-panel" style="display: none;">
        <div class="meet-info">
          <div class="info-label">Google Meet Detected</div>
          <div id="meetUrl" class="info-value truncate">—</div>
        </div>

        <!-- Project Selector -->
        <div class="project-selector">
          <div class="info-label">Link to Project</div>
          <select id="projectSelect" class="select-input">
            <option value="">No project (standalone capture)</option>
          </select>
          <div id="projectMatchHint" class="project-match-hint" style="display: none;"></div>
        </div>

        <button id="startBtn" class="primary-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="4" fill="currentColor" />
          </svg>
          Start Capture
        </button>
      </div>

      <!-- Capturing State -->
      <div id="capturingState" class="state-panel" style="display: none;">
        <div class="capture-active">
          <div class="pulse-ring"></div>
          <span class="capture-label">Capturing...</span>
        </div>

        <div id="projectBadge" class="project-badge" style="display: none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
          </svg>
          <span id="projectBadgeName">—</span>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="eventCount">0</div>
            <div class="stat-label">Events Captured</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="sentCount">0</div>
            <div class="stat-label">Events Sent</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="durationDisplay">0:00</div>
            <div class="stat-label">Duration</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="meetingIdDisplay">—</div>
            <div class="stat-label">Meeting ID</div>
          </div>
        </div>

        <button id="stopBtn" class="danger-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" />
          </svg>
          Stop Capture
        </button>
      </div>
    </main>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="settings-panel" style="display: none;">
      <h2 class="settings-title">Settings</h2>
      <div class="form-group">
        <label for="backendUrlInput">Backend URL</label>
        <input type="url" id="backendUrlInput" placeholder="http://localhost:3002" value="http://localhost:3002">
      </div>
      <div class="form-group">
        <label for="authTokenInput">Auth Token <span class="optional">(optional)</span></label>
        <input type="password" id="authTokenInput" placeholder="Enter auth token">
      </div>
      <div class="settings-actions">
        <button id="saveSettingsBtn" class="primary-btn small">Save Settings</button>
        <button id="testConnectionBtn" class="secondary-btn small">Test Connection</button>
      </div>
      <div id="settingsStatus" class="settings-status"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>Meeting AI Extension v1.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
