<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Meeting AI Permissions</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #111827;
      color: #f3f4f6;
    }
    .container {
      background: #1f2937;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
    }
    p {
      color: #9ca3af;
      line-height: 1.5;
      margin-bottom: 30px;
    }
    button {
      background-color: #8b5cf6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #7c3aed;
    }
    #status {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Microphone Access Required</h1>
    <p>To accurately capture your voice during Google Meet sessions, Meeting AI needs microphone access. Without it, the extension can only transcribe other participants.</p>
    <button id="grant-btn">Grant Microphone Permission</button>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
